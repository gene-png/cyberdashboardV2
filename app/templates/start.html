{% extends "base.html" %}
{% block title %}Start Assessment — ZT Dashboard{% endblock %}
{% block content %}
<div class="auth-card">
  <h1>Start New Assessment</h1>
  <p style="color:#64748b;margin-bottom:1.5rem;">Fill in the details below. You'll use your name and password to return to this assessment later.</p>

  <form method="POST" action="{{ url_for('auth.start_assessment') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

    <div class="form-group">
      <label for="name">Your Name *</label>
      <input type="text" id="name" name="name" required placeholder="Jane Smith"
             value="{{ request.form.get('name', '') }}" autocomplete="name" />
    </div>

    <div class="form-group">
      <label for="org">Organisation Name *</label>
      <input type="text" id="org" name="org" required placeholder="Acme Corp"
             value="{{ request.form.get('org', '') }}" autocomplete="organization" />
    </div>

    <div class="form-group">
      <label for="framework">Framework</label>
      <select id="framework" name="framework">
        <option value="dod_zt">DoD Zero Trust Framework</option>
        <option value="cisa_zt">CISA Zero Trust Maturity Model</option>
      </select>
    </div>

    <div class="form-group">
      <label for="password">Password * (min 12 characters)</label>
      <input type="password" id="password" name="password" required minlength="12"
             autocomplete="new-password" />
    </div>

    <div class="form-group">
      <label for="confirm">Confirm Password *</label>
      <input type="password" id="confirm" name="confirm" required minlength="12"
             autocomplete="new-password" />
    </div>

    <button type="submit" class="btn btn-primary btn-block">Create Assessment</button>
    <p style="text-align:center;margin-top:1rem;font-size:13px;">
      <a href="{{ url_for('auth.landing') }}">Back</a>
    </p>
  </form>
</div>
{% endblock %}
