{% extends "base.html" %}
{% block title %}Resume Assessment — ZT Dashboard{% endblock %}
{% block content %}
<div class="auth-card">
  <h1>Resume Assessment</h1>
  <p style="color:#64748b;margin-bottom:1.5rem;">Enter your name and password to continue an existing assessment.</p>
  <form method="POST" action="{{ url_for('auth.resume') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
    <div class="form-group">
      <label for="username">Your Name</label>
      <input type="text" id="username" name="username" required autocomplete="username"
             value="{{ request.form.get('username', '') }}" />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" />
    </div>
    <button type="submit" class="btn btn-primary btn-block">Continue</button>
    <p style="text-align:center;margin-top:1rem;font-size:13px;">
      <a href="{{ url_for('auth.landing') }}">← Back</a>
    </p>
  </form>
</div>
{% endblock %}
