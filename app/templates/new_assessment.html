{% extends "base.html" %}
{% block title %}New Assessment{% endblock %}
{% block content %}
<div class="page-header">
  <h1>New Assessment</h1>
  <a href="{{ url_for('dashboard.index') }}" class="btn btn-outline">Cancel</a>
</div>
<form method="POST" action="{{ url_for('dashboard.new_assessment') }}" class="form-card">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

  <fieldset>
    <legend>Customer Details</legend>
    <div class="form-group">
      <label for="customer_org">Organization Name</label>
      <input type="text" id="customer_org" name="customer_org" required placeholder="e.g. Acme Federal Agency" />
    </div>
    <div class="form-group">
      <label for="username">Customer Username</label>
      <input type="text" id="username" name="username" required placeholder="e.g. acme.customer" />
    </div>
    <div class="form-group">
      <label for="password">Customer Password</label>
      <input type="password" id="password" name="password" required />
    </div>
  </fieldset>

  <fieldset>
    <legend>Framework</legend>
    <div class="form-group">
      <label for="framework">Assessment Framework</label>
      <select id="framework" name="framework">
        <option value="dod_zt">DoD Zero Trust Reference Architecture</option>
        <option value="cisa_zt">CISA Zero Trust Maturity Model 2.0</option>
      </select>
    </div>
    <div class="form-group">
      <label for="variant">Variant</label>
      <select id="variant" name="variant">
        <option value="zt_only">ZT Only</option>
        <option value="with_org_profile">With Org Profile</option>
      </select>
    </div>
  </fieldset>

  <button type="submit" class="btn btn-primary">Create Assessment</button>
</form>
{% endblock %}
